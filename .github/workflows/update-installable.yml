name: Update Installable Branch

on:
    push:
        branches: [master]

# Prevent concurrent runs — only latest commit matters
concurrency:
    group: update-installable
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    build-and-update:
        name: Build dist → installable branch
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  ref: master
                  fetch-depth: 0 # full history for branch operations

            - name: Check if installable branch is already up to date
              id: noop_check
              run: |
                  SOURCE_SHA="$(git rev-parse HEAD)"
                  if git show-ref --verify --quiet refs/remotes/origin/installable; then
                    EXISTING_MSG="$(git log -1 --format='%B' origin/installable)"
                    if echo "$EXISTING_MSG" | grep -qF "Source-Commit: $SOURCE_SHA"; then
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      echo "Installable branch already built from $SOURCE_SHA — skipping."
                    else
                      echo "skip=false" >> "$GITHUB_OUTPUT"
                    fi
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Setup Node.js
              if: steps.noop_check.outputs.skip != 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              if: steps.noop_check.outputs.skip != 'true'
              run: npm ci --ignore-scripts

            - name: Build
              if: steps.noop_check.outputs.skip != 'true'
              run: npm run build

            - name: Verify build output
              if: steps.noop_check.outputs.skip != 'true'
              run: |
                  test -f dist/index.js || { echo "::error::dist/index.js not found"; exit 1; }

            - name: Prepare and push installable branch
              if: steps.noop_check.outputs.skip != 'true'
              run: |
                  SOURCE_SHA="$(git rev-parse --short HEAD)"
                  SOURCE_SHA_FULL="$(git rev-parse HEAD)"
                  SOURCE_MSG="$(git log -1 --format='%s')"

                  # Configure git for the commit
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Create or reset installable branch to match master
                  git checkout -B installable master

                  # Force-add the built dist directory
                  git add -f dist/

                  # Only commit + push if there are changes
                  if git diff --cached --quiet; then
                    echo "No changes — installable branch is already up to date."
                  else
                    git commit -m "chore: update installable branch from master ($SOURCE_SHA)

                  Source: $SOURCE_MSG
                  Source-Commit: $SOURCE_SHA_FULL
                  Built from: $SOURCE_SHA on $(date -u '+%Y-%m-%dT%H:%M:%SZ')
                  Auto-generated by GitHub Actions"

                    git push origin installable --force-with-lease
                    echo "✅ Installable branch updated."
                  fi
